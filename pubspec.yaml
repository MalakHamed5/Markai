# ------------------- PROJECT INFO -------------------
name: ecommerse
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  # sdk: ^3.11.0
# ------------------- DEPENDENCIES -------------------
dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  sizer: ^3.1.3
  device_preview: ^1.3.1
  responsive_framework: ^1.5.1
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  flutter_localizations:
    sdk: flutter


  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  freezed_annotation: ^3.1.0
  equatable: ^2.0.8

  # Depandancy Injection
  json_annotation: ^4.11.0
  injectable: ^2.7.1+4
  get_it: ^9.2.1

  # Networking
  retrofit: ^4.9.2
  dio: ^5.9.2
  logger: ^2.7.0

  
  # Data
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5
  

  # Utilities
  dartz: ^0.10.1
  go_router: ^17.1.0
  intl: ^0.20.2
  json_serializable: ^6.13.1
  jwt_decoder: ^2.0.1
  internet_connection_checker_plus: ^2.9.1+2
  
  
  

# ------------------- DEV DEPENDENCIES -------------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  injectable_generator: ^2.12.1
  freezed: ^3.2.3
  build_runner: ^2.13.1

# ------------------- IMAGES & FONTS -------------------
# IMAGES 
flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_assets:
  assets_path: assets/
  output_path: lib/core/constants/
  filename: assets.dart
  field_prefix:

# FONTS 
flutter_intl:
  enabled: true

