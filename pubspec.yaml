# ------------------- PROJECT INFO -------------------
name: ecommerse
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0
# ------------------- DEPENDENCIES -------------------
dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  sizer: ^3.1.3
  device_preview: ^1.3.1
  iconsax: ^0.0.8
  responsive_framework: ^1.5.1
  flutter_localizations:
    sdk: flutter


  # State Management
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  bloc: ^9.2.0
  

  # Networking
  retrofit: ^4.9.2
  dio: ^5.9.2
  logger: ^2.7.0

  # Data
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  equatable: ^2.0.8

  # Utilities
  dartz: ^0.10.1
  go_router: ^17.1.0
  intl: ^0.20.2
  vector_graphics: ^1.1.19
  gap: ^3.0.1
  retrofit_generator: ^10.2.3
  json_serializable: ^6.13.1
  shared_preferences: ^2.5.5
  jwt_decoder: ^2.0.1
  internet_connection_checker_plus: ^2.9.1+2
  flutter_secure_storage: ^10.0.0
  
  
  

# ------------------- DEV DEPENDENCIES -------------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  injectable_generator: ^2.12.0
  freezed: ^3.2.3
  hive_ce_generator: ^1.11.0
  vector_graphics_compiler: ^1.2.0
  build_runner: ^2.13.1
  intl_utils: any

# ------------------- IMAGES & FONTS -------------------
# IMAGES 
flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_assets:
  assets_path: assets/
  output_path: lib/core/constants/
  filename: assets.dart
  field_prefix:

# FONTS 
flutter_intl:
  enabled: true

